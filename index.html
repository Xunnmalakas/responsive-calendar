<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Calendar - Arriane Shayne Alarcon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fff0f3 0%, #f8e1e7 100%);
            min-height: 100vh;
            color: #5e548e;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(255, 175, 204, 0.2);
            border: 2px solid #ffafcc;
        }

        .header h1 {
            color: #ff758f;
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .year-display {
            color: #cdb4db;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .student-info {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed #ffafcc;
        }

        .student-name {
            color: #ff758f;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .student-course {
            color: #5e548e;
            font-size: 1rem;
            font-weight: 600;
        }

        .calendar-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .year-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .month-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .month-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: #ffafcc;
            box-shadow: 0 15px 40px rgba(255, 175, 204, 0.3);
        }

        .month-card.focused {
            border: 3px solid #ff758f;
            box-shadow: 0 0 30px rgba(255, 175, 204, 0.6);
            transform: scale(1.05);
        }

        .month-name {
            text-align: center;
            font-size: 1.2rem;
            color: #ff758f;
            font-weight: 700;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px dashed #ffafcc;
            text-transform: uppercase;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 5px;
        }

        .weekday {
            text-align: center;
            font-size: 0.7rem;
            color: #cdb4db;
            font-weight: 600;
            padding: 5px 0;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            border-radius: 5px;
            padding: 5px;
            position: relative;
        }

        .day:hover {
            background: #fff0f3;
        }

        .day.empty {
            background: transparent;
            color: #ccc;
        }

        .day.weekend {
            color: #ff758f;
        }

        .day.today {
            background: #ffafcc;
            color: white;
            font-weight: 700;
        }

        .day.has-event::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: #ff4d6d;
            border-radius: 50%;
        }

        /* Focused Month View */
        .focused-month-view {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 240, 243, 0.98);
            z-index: 200;
            padding: 20px;
            overflow-y: auto;
        }

        .focused-month-view.active {
            display: block;
        }

        .focused-content {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.2);
            border: 3px solid #ffafcc;
            margin-top: 20px;
            position: relative;
            width: 100%; /* Added */
            box-sizing: border-box; /* Added */
        }

        .close-focused {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #fff0f3;
            border: 2px solid #ffafcc;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5e548e;
        }

        .close-focused:hover {
            background:#ffafcc;
            color: white;
            transform: rotate(90deg);
        }

        .focused-title {
            text-align: center;
            font-size: 2.5rem;
            color: #ff758f;
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .focused-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap; /* Added for mobile */
        }

        .nav-btn {
            background: #ffafcc;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(255, 175, 204, 0.4);
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            background: #ff85a1;
            box-shadow: 0 6px 15px rgba(255, 175, 204, 0.6);
        }

        .focused-calendar {
            width: 100%;
            border-collapse: separate;
            border-spacing: 8px; /* Reduced from 10px */
            table-layout: fixed; /* Added - crucial for equal column widths */
        }

        .focused-calendar th {
            padding: 15px 2px; /* Reduced horizontal padding */
            font-weight: 700;
            color: #cdb4db;
            text-transform: uppercase;
            font-size: 0.9rem;
            width: 14.28%; /* Added - equal width for 7 columns */
        }

        .focused-calendar td {
            aspect-ratio: 1;
            background: #fff9fb;
            border-radius: 15px;
            text-align: center;
            vertical-align: middle;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            height: 70px; /* Changed from min-height to fixed height */
            font-size: 1.2rem;
            font-weight: 600;
            width: 14.28%; /* Added - equal width for 7 columns */
        }

        .focused-calendar td:hover {
            background: #fff0f3;
            border-color: #ffafcc;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 175, 204, 0.3);
        }

        .focused-calendar td.other-month {
            opacity: 0.3;
            background: #f5f5f5;
            cursor: default;
        }

        .focused-calendar td.other-month:hover {
            transform: none;
            border-color: transparent;
            box-shadow: none;
        }

        .focused-calendar td.today {
            background: linear-gradient(135deg, #ffafcc 0%, #ff85a1 100%);
            color: white;
        }

        .event-indicator {
            display: flex;
            gap: 3px;
            justify-content: center;
            margin-top: 5px;
            flex-wrap: wrap; /* Added */
        }

        .event-dot {
            width: 6px;
            height: 6px;
            background: #ff4d6d;
            border-radius: 50%;
        }

        .event-modal {
            display: none;
            position: fixed;
            z-index: 300;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .event-modal-content {
            background: white;
            margin: 10% auto;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            border-radius: 25px;
            border: 3px solid #ffafcc;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .event-modal-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .event-modal-date {
            font-size: 1.5rem;
            color: #ff758f;
            font-weight: 700;
        }

        .event-modal-day {
            color: #cdb4db;
            font-size: 1rem;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #cdb4db;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            margin-bottom: 20px;
        }

        textarea:focus {
            outline: none;
            border-color: #ffafcc;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
        }

        .btn-close { background: #95a5a6; }
        .btn-close:hover { background: #7f8c8d; }
        .btn-delete { background: #e74c3c; }
        .btn-delete:hover { background: #c0392b; }
        .btn-save { background: #27ae60; }
        .btn-save:hover { background: #229954; }

        @media (max-width: 1200px) {
            .year-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .year-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .year-grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 1.8rem;
            }
            .student-name {
                font-size: 1.1rem;
            }
            .focused-content {
                padding: 20px;
                margin-top: 10px;
            }
            .focused-title {
                font-size: 1.8rem;
            }
            .focused-calendar {
                border-spacing: 4px; /* Smaller spacing on mobile */
            }
            .focused-calendar th {
                padding: 10px 1px;
                font-size: 0.75rem;
            }
            .focused-calendar td {
                height: 50px; /* Smaller cells on mobile */
                font-size: 1rem;
                border-radius: 10px;
            }
            .nav-btn {
                padding: 10px 15px;
                font-size: 0.85rem;
            }
        }

        @media print {
            body { background: white; }
            .month-card { break-inside: avoid; }
        }
    </style>
</head>
<body>
    <div id="mainView">
        <div class="header">
            <h1>✨ 2026 Calendar</h1>
            <div class="year-display">Full Year View</div>
            
            <div class="student-info">
                <div class="student-name">Arriane Shayne Alarcon</div>
                <div class="student-course">BSIE 2A - Computer Programming</div>
            </div>
        </div>

        <div class="calendar-container">
            <div class="year-grid" id="yearGrid"></div>
        </div>
    </div>

    <div class="focused-month-view" id="focusedView">
        <div class="focused-content">
            <button class="close-focused" onclick="closeFocusedView()">✕</button>
            <div class="focused-title" id="focusedTitle">January 2026</div>
            <div class="focused-nav">
                <button class="nav-btn" onclick="changeFocusedMonth(-1)">◀ Previous Month</button>
                <button class="nav-btn" onclick="closeFocusedView()">Back to Year</button>
                <button class="nav-btn" onclick="changeFocusedMonth(1)">Next Month ▶</button>
            </div>
            <table class="focused-calendar" id="focusedCalendar"></table>
        </div>
    </div>

    <div class="event-modal" id="eventModal">
        <div class="event-modal-content">
            <div class="event-modal-header">
                <div class="event-modal-date" id="eventDate">January 1, 2026</div>
                <div class="event-modal-day" id="eventDay">Thursday</div>
            </div>
            <textarea id="eventInput" placeholder="Add your events here...
One event per line"></textarea>
            <div class="modal-buttons">
                <button class="btn-close" onclick="closeEventModal()">Close</button>
                <button class="btn-delete" onclick="deleteEvent()">Delete</button>
                <button class="btn-save" onclick="saveEvent()">Save</button>
            </div>
        </div>
    </div>

    <script>
        const currentYear = 2026;
        let focusedMonth = 0;
        let selectedDate = null;

        const months = [
            "January", "February", "March", "April", "May", "June",
            "July", "August", "September", "October", "November", "December"
        ];

        const daysOfWeek = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        
        let events = JSON.parse(localStorage.getItem("calendarEvents2026")) || {};

        function init() {
            renderYearView();
            setupKeyboardNav();
        }

        function renderYearView() {
            const grid = document.getElementById('yearGrid');
            grid.innerHTML = '';

            months.forEach((month, index) => {
                const card = createMonthCard(index);
                grid.appendChild(card);
            });
        }

        function createMonthCard(monthIndex) {
            const card = document.createElement('div');
            card.className = 'month-card';
            card.id = `month-${monthIndex}`;
            card.onclick = () => focusMonth(monthIndex);

            const title = document.createElement('div');
            title.className = 'month-name';
            title.textContent = months[monthIndex];
            card.appendChild(title);

            const weekdaysDiv = document.createElement('div');
            weekdaysDiv.className = 'weekdays';
            daysOfWeek.forEach(day => {
                const wd = document.createElement('div');
                wd.className = 'weekday';
                wd.textContent = day[0];
                weekdaysDiv.appendChild(wd);
            });
            card.appendChild(weekdaysDiv);

            const daysDiv = document.createElement('div');
            daysDiv.className = 'days-grid';

            const firstDay = new Date(currentYear, monthIndex, 1).getDay();
            const daysInMonth = new Date(currentYear, monthIndex + 1, 0).getDate();
            const daysInPrevMonth = new Date(currentYear, monthIndex, 0).getDate();
            const today = new Date();

            for (let i = firstDay - 1; i >= 0; i--) {
                const day = document.createElement('div');
                day.className = 'day empty';
                day.textContent = daysInPrevMonth - i;
                daysDiv.appendChild(day);
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const day = document.createElement('div');
                day.className = 'day';
                
                const dayOfWeek = (firstDay + d - 1) % 7;
                const isToday = today.getDate() === d && 
                               today.getMonth() === monthIndex && 
                               today.getFullYear() === currentYear;
                
                if (isToday) day.classList.add('today');
                if (dayOfWeek === 0 || dayOfWeek === 6) day.classList.add('weekend');

                const dateKey = `2026-${String(monthIndex + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                if (events[dateKey] && events[dateKey].length > 0) {
                    day.classList.add('has-event');
                }

                day.textContent = d;
                daysDiv.appendChild(day);
            }

            const totalCells = firstDay + daysInMonth;
            const remaining = 42 - totalCells;
            for (let d = 1; d <= remaining; d++) {
                const day = document.createElement('div');
                day.className = 'day empty';
                day.textContent = d;
                daysDiv.appendChild(day);
            }

            card.appendChild(daysDiv);
            return card;
        }

        function focusMonth(monthIndex) {
            focusedMonth = monthIndex;
            
            document.querySelectorAll('.month-card').forEach(card => {
                card.classList.remove('focused');
            });
            document.getElementById(`month-${monthIndex}`).classList.add('focused');
            
            document.getElementById('focusedTitle').textContent = `${months[monthIndex]} 2026`;
            renderFocusedCalendar();
            document.getElementById('focusedView').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeFocusedView() {
            document.getElementById('focusedView').classList.remove('active');
            document.body.style.overflow = '';
            
            document.querySelectorAll('.month-card').forEach(card => {
                card.classList.remove('focused');
            });
        }

        function changeFocusedMonth(delta) {
            focusedMonth += delta;
            if (focusedMonth > 11) focusedMonth = 0;
            else if (focusedMonth < 0) focusedMonth = 11;
            
            document.getElementById('focusedTitle').textContent = `${months[focusedMonth]} 2026`;
            renderFocusedCalendar();
        }

        function renderFocusedCalendar() {
            const table = document.getElementById('focusedCalendar');
            table.innerHTML = '';

            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            daysOfWeek.forEach(day => {
                const th = document.createElement('th');
                th.textContent = day;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            const firstDay = new Date(currentYear, focusedMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, focusedMonth + 1, 0).getDate();
            const daysInPrevMonth = new Date(currentYear, focusedMonth, 0).getDate();
            const today = new Date();

            let dayCount = 1;

            for (let row = 0; row < 6; row++) {
                if (dayCount > daysInMonth) break;
                const tr = document.createElement('tr');
                
                for (let col = 0; col < 7; col++) {
                    const td = document.createElement('td');

                    if (row === 0 && col < firstDay) {
                        td.textContent = daysInPrevMonth - (firstDay - col - 1);
                        td.classList.add('other-month');
                    } else if (dayCount <= daysInMonth) {
                        td.textContent = dayCount;

                        const isToday = today.getDate() === dayCount && 
                                       today.getMonth() === focusedMonth && 
                                       today.getFullYear() === currentYear;
                        
                        if (isToday) td.classList.add('today');

                        const dateKey = `2026-${String(focusedMonth + 1).padStart(2, '0')}-${String(dayCount).padStart(2, '0')}`;
                        if (events[dateKey] && events[dateKey].length > 0) {
                            const indicator = document.createElement('div');
                            indicator.className = 'event-indicator';
                            const count = Math.min(events[dateKey].length, 3);
                            for (let i = 0; i < count; i++) {
                                const dot = document.createElement('div');
                                dot.className = 'event-dot';
                                indicator.appendChild(dot);
                            }
                            td.appendChild(indicator);
                        }

                        td.onclick = () => openEventModal(dayCount);
                        dayCount++;
                    } else {
                        td.textContent = dayCount - daysInMonth;
                        td.classList.add('other-month');
                        dayCount++;
                    }
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }

            table.appendChild(tbody);
        }

        function openEventModal(day) {
            selectedDate = new Date(currentYear, focusedMonth, day);
            const dateKey = `2026-${String(focusedMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            
            document.getElementById('eventDate').textContent = selectedDate.toLocaleDateString('en-US', {
                month: 'long', day: 'numeric', year: 'numeric'
            });
            document.getElementById('eventDay').textContent = selectedDate.toLocaleDateString('en-US', { weekday: 'long' });
            
            const dayEvents = events[dateKey] || [];
            document.getElementById('eventInput').value = dayEvents.join('\n');
            
            document.getElementById('eventModal').style.display = 'block';
            document.getElementById('eventInput').focus();
        }

        function closeEventModal() {
            document.getElementById('eventModal').style.display = 'none';
            selectedDate = null;
        }

        function saveEvent() {
            if (!selectedDate) return;
            
            const dateKey = `2026-${String(selectedDate.getMonth() + 1).padStart(2, '0')}-${String(selectedDate.getDate()).padStart(2, '0')}`;
            const input = document.getElementById('eventInput').value.trim();
            
            if (input) {
                events[dateKey] = input.split('\n').filter(e => e.trim());
            } else {
                delete events[dateKey];
            }
            
            localStorage.setItem('calendarEvents2026', JSON.stringify(events));
            renderFocusedCalendar();
            renderYearView();
            closeEventModal();
        }

        function deleteEvent() {
            if (!selectedDate) return;
            
            const dateKey = `2026-${String(selectedDate.getMonth() + 1).padStart(2, '0')}-${String(selectedDate.getDate()).padStart(2, '0')}`;
            delete events[dateKey];
            
            localStorage.setItem('calendarEvents2026', JSON.stringify(events));
            renderFocusedCalendar();
            renderYearView();
            closeEventModal();
        }

        function setupKeyboardNav() {
            document.addEventListener('keydown', e => {
                if (document.getElementById('eventModal').style.display === 'block') {
                    if (e.key === 'Escape') closeEventModal();
                    return;
                }

                if (document.getElementById('focusedView').classList.contains('active')) {
                    if (e.key === 'Escape') closeFocusedView();
                    else if (e.key === 'ArrowLeft') changeFocusedMonth(-1);
                    else if (e.key === 'ArrowRight') changeFocusedMonth(1);
                }
            });
        }

        window.onclick = function(e) {
            const modal = document.getElementById('eventModal');
            if (e.target === modal) closeEventModal();
        };

        init();
    </script>
</body>
</html>
