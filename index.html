<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Calendar - Monthly View</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>✨ My Calendar</h1>
            <div class="nav-controls">
                <button class="nav-btn" onclick="changeMonth(-1)" aria-label="Previous month">◀</button>
                <button onclick="goToToday()" class="today-btn">📍 Today</button>
                <button class="nav-btn" onclick="changeMonth(1)" aria-label="Next month">▶</button>
            </div>
        </div>
    </div>

    <div class="calendar-wrapper">
        <div class="month-container">
            <div class="month-header">
                <div class="month-title" id="monthTitle">January</div>
                <div class="year-display" id="yearDisplay">2026</div>
            </div>
            
            <div class="calendar-grid" id="calendarGrid"></div>

            <div class="mobile-nav" id="mobileNav"></div>
            <div class="swipe-hint">👆 Swipe left/right to navigate</div>
        </div>
    </div>

    <div id="eventModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-date" id="modalDate">January 1, 2026</div>
                <div class="modal-day" id="modalDay">Thursday</div>
            </div>
            <textarea id="eventInput" placeholder="Write your plans here... 📝✨"></textarea>
            <div class="modal-footer">
                <button class="close-btn" onclick="closeModal()">Close</button>
                <button class="delete-btn" onclick="deleteEvent()">Delete</button>
                <button class="save-btn" onclick="saveEvent()">Save ✨</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
