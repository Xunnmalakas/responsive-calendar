<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Calendar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fff5f7;
            padding: 20px;
            color: #5e548e;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(255, 175, 204, 0.2);
            border: 2px solid #ffafcc;
        }

        h1 {
            color: #ff758f;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #cdb4db;
            font-size: 1.1rem;
        }

        .year-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .month-box {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #ffe5ec;
        }

        .month-name {
            text-align: center;
            font-size: 1.2rem;
            color: #ff758f;
            font-weight: 700;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px dashed #ffafcc;
            text-transform: uppercase;
        }

        .calendar-table {
            width: 100%;
            border-collapse: collapse;
        }

        .calendar-table th {
            font-size: 0.7rem;
            color: #cdb4db;
            padding: 5px;
            font-weight: 600;
        }

        .calendar-table td {
            text-align: center;
            padding: 6px 4px;
            font-size: 0.85rem;
            border-radius: 5px;
        }

        .calendar-table td:hover {
            background: #fff0f3;
        }

        .today {
            background: #ffafcc !important;
            color: white !important;
            font-weight: 700;
        }

        .weekend {
            color: #ff758f;
        }

        @media (max-width: 1200px) {
            .year-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .year-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .year-grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.8rem;
            }
        }

        @media print {
            body {
                background: white;
                padding: 10px;
            }
            .header {
                box-shadow: none;
                border: 1px solid #ddd;
                margin-bottom: 15px;
            }
            .month-box {
                box-shadow: none;
                border: 1px solid #ddd;
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>2026 Calendar</h1>
        <div class="subtitle">Full Year View</div>
    </div>

    <div class="year-grid" id="yearGrid"></div>

    <script>
        const months = [
            "January", "February", "March", "April",
            "May", "June", "July", "August",
            "September", "October", "November", "December"
        ];

        const daysOfWeek = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

        function createMonthCalendar(monthIndex) {
            const year = 2026;
            const firstDay = new Date(year, monthIndex, 1).getDay();
            const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
            const today = new Date();

            let html = `
                <div class="month-box">
                    <div class="month-name">${months[monthIndex]}</div>
                    <table class="calendar-table">
                        <thead>
                            <tr>
                                ${daysOfWeek.map(day => `<th>${day}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody>
            `;

            let dayCount = 1;

            for (let row = 0; row < 6; row++) {
                if (dayCount > daysInMonth) break;
                
                html += '<tr>';
                
                for (let col = 0; col < 7; col++) {
                    if (row === 0 && col < firstDay) {
                        html += '<td></td>';
                    } else if (dayCount <= daysInMonth) {
                        const isToday = today.getDate() === dayCount && 
                                       today.getMonth() === monthIndex && 
                                       today.getFullYear() === year;
                        
                        const isWeekend = col === 0 || col === 6;
                        const classes = [];
                        
                        if (isToday) classes.push('today');
                        if (isWeekend) classes.push('weekend');
                        
                        html += `<td class="${classes.join(' ')}">${dayCount}</td>`;
                        dayCount++;
                    } else {
                        html += '<td></td>';
                    }
                }
                
                html += '</tr>';
            }

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            return html;
        }

        function renderCalendar() {
            const grid = document.getElementById('yearGrid');
            let html = '';
            
            for (let i = 0; i < 12; i++) {
                html += createMonthCalendar(i);
            }
            
            grid.innerHTML = html;
        }

        renderCalendar();
    </script>
</body>
</html>
